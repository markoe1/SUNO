version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-suno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-suno_clips}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-suno} -d ${POSTGRES_DB:-suno_clips}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    # No volume mounts in prod — image is the source of truth

  worker:
    build: .
    command: python -m rq worker suno-clips --url ${REDIS_URL}
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      replicas: 2

  billing:
    build: .
    command: python billing_server.py
    ports:
      - "5001:5001"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: always
    # Handles Whop webhook events (membership.went_valid / went_invalid)
    # Webhook URL to set in Whop dashboard: https://yourdomain.com:5001/webhook
    # Or proxy through nginx/Render with path /billing/webhook

volumes:
  pgdata:
  redisdata:
