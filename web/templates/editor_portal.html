<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor Portal — SUNO Clips</title>
  <link rel="stylesheet" href="/static/app.css">
  <style>
    .editor-nav { background:#111115;border-bottom:1px solid #1e1e24;padding:0 24px;display:flex;align-items:center;gap:16px;height:56px; }
    .editor-nav .logo { color:#00ff87;font-weight:700;font-size:16px;text-decoration:none; }
    .editor-nav .spacer { flex:1; }
    .clip-card { background:#16161a;border:1px solid #1e1e24;border-radius:10px;padding:20px;margin-bottom:12px; }
    .clip-card:hover { border-color:#2a2a3a; }
    .clip-header { display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px; }
    .clip-title { font-size:15px;font-weight:500; }
    .clip-meta { font-size:12px;color:#555;margin-top:4px; }
    .stage-tabs { display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap; }
    .stage-tabs button { background:#16161a;border:1px solid #1e1e24;color:#888;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer; }
    .stage-tabs button.active-filter { border-color:#00ff87;color:#00ff87; }
  </style>
</head>
<body>

<nav class="editor-nav">
  <span class="logo">SUNO Clips — Editor</span>
  <div class="spacer"></div>
  <span id="editor-greeting" style="color:#555;font-size:13px;"></span>
  <button class="btn btn-secondary btn-sm" onclick="editorLogout()" style="margin-left:16px;">Logout</button>
</nav>

<div style="max-width:900px;margin:32px auto;padding:0 24px;">

  <div id="flash-container"></div>

  <!-- Stats -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px;">
    <div class="stat-box" style="text-align:center;">
      <div style="font-size:28px;font-weight:700;color:#00ff87;" id="stat-pending">—</div>
      <div style="font-size:12px;color:#555;text-transform:uppercase;margin-top:4px;">Clips Waiting</div>
    </div>
    <div class="stat-box" style="text-align:center;">
      <div style="font-size:28px;font-weight:700;color:#f39c12;" id="stat-editing">—</div>
      <div style="font-size:12px;color:#555;text-transform:uppercase;margin-top:4px;">In Progress</div>
    </div>
    <div class="stat-box" style="text-align:center;">
      <div style="font-size:28px;font-weight:700;" id="stat-done">—</div>
      <div style="font-size:12px;color:#555;text-transform:uppercase;margin-top:4px;">Done This Month</div>
    </div>
  </div>

  <div class="stage-tabs">
    <button class="active-filter" data-s="RAW" onclick="setStage(this,'RAW')">Waiting</button>
    <button data-s="EDITING" onclick="setStage(this,'EDITING')">In Progress</button>
    <button data-s="REVIEW" onclick="setStage(this,'REVIEW')">In Review</button>
    <button data-s="APPROVED" onclick="setStage(this,'APPROVED')">Approved</button>
  </div>

  <div id="clips-container">
    <p style="color:#555;">Loading your clips…</p>
  </div>

</div>

<script>
let currentStage = 'RAW';

async function editorFetch(url, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  const res = await fetch(url, { ...opts, headers, credentials: 'include' });
  if (res.status === 401) { window.location.href = '/editor/login'; return null; }
  return res;
}

async function editorLogout() {
  await fetch('/api/editor/logout', { method: 'POST', credentials: 'include' });
  window.location.href = '/editor/login';
}

function showFlash(msg, type) {
  const el = document.getElementById('flash-container');
  el.innerHTML = `<div class="flash flash-${type}" style="margin-bottom:16px;">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 4000);
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString();
}

function setStage(btn, stage) {
  currentStage = stage;
  document.querySelectorAll('.stage-tabs button').forEach(b => b.classList.remove('active-filter'));
  btn.classList.add('active-filter');
  loadMyClips();
}

async function loadStats() {
  const [rawRes, editRes, doneRes] = await Promise.all([
    editorFetch('/api/editor/clips?clip_status=RAW'),
    editorFetch('/api/editor/clips?clip_status=EDITING'),
    editorFetch('/api/editor/clips?clip_status=REVIEW'),
  ]);

  if (rawRes && rawRes.ok) {
    const data = await rawRes.json();
    document.getElementById('stat-pending').textContent = data.length;
  }
  if (editRes && editRes.ok) {
    const data = await editRes.json();
    document.getElementById('stat-editing').textContent = data.length;
  }
  if (doneRes && doneRes.ok) {
    const data = await doneRes.json();
    document.getElementById('stat-done').textContent = data.length;
  }
}

async function loadMyClips() {
  const el = document.getElementById('clips-container');
  el.innerHTML = '<p style="color:#555;">Loading…</p>';

  const res = await editorFetch(`/api/editor/clips?clip_status=${currentStage}`);
  if (!res) return;
  const clips = await res.json();

  if (!clips.length) {
    el.innerHTML = `<p style="color:#555;">No ${currentStage.toLowerCase()} clips assigned to you.</p>`;
    return;
  }

  el.innerHTML = clips.map(c => `
    <div class="clip-card">
      <div class="clip-header">
        <div>
          <div class="clip-title">${c.title || c.hook_used || 'Untitled clip'}</div>
          <div class="clip-meta">Client: ${c.client_name || '—'} · Added ${fmtDate(c.created_at)}</div>
          ${c.hook_used ? `<div class="clip-meta" style="font-style:italic;margin-top:4px;">"${c.hook_used}"</div>` : ''}
        </div>
        <span class="badge ${c.status === 'RAW' ? 'badge-muted' : c.status === 'EDITING' ? 'badge-orange' : 'badge-green'}">${c.status}</span>
      </div>

      ${c.content_notes ? `<p style="font-size:12px;color:#555;margin-bottom:12px;">${c.content_notes}</p>` : ''}

      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${c.status === 'RAW' ? `
          <button class="btn btn-primary btn-sm" onclick="advanceClip('${c.id}', 'EDITING', this)">Start Editing</button>
        ` : ''}
        ${c.status === 'EDITING' ? `
          <button class="btn btn-primary btn-sm" onclick="advanceClip('${c.id}', 'REVIEW', this)">Submit for Review</button>
        ` : ''}
        ${c.status === 'REVIEW' ? `
          <span style="font-size:12px;color:#f39c12;">Waiting for approval…</span>
        ` : ''}
        ${c.status === 'APPROVED' ? `
          <span style="font-size:12px;color:#00ff87;">Approved — ready to post!</span>
        ` : ''}
        ${c.drive_folder || c.raw_file_path ? `
          <a class="btn btn-secondary btn-sm" href="${c.drive_folder || c.raw_file_path}" target="_blank" rel="noopener">Open Raw File</a>
        ` : ''}
      </div>
    </div>`).join('');
}

async function advanceClip(clipId, newStatus, btn) {
  btn.disabled = true;
  const res = await editorFetch(`/api/editor/clips/${clipId}/status`, {
    method: 'PATCH',
    body: JSON.stringify({ status: newStatus }),
  });
  if (res && res.ok) {
    showFlash(`Clip moved to ${newStatus}`, 'success');
    loadMyClips();
    loadStats();
  } else {
    const err = res ? await res.json().catch(() => ({})) : {};
    showFlash(err.detail || 'Failed to update clip', 'error');
    btn.disabled = false;
  }
}

async function init() {
  const meRes = await editorFetch('/api/editor/me');
  if (!meRes) return;
  if (meRes.ok) {
    const me = await meRes.json();
    document.getElementById('editor-greeting').textContent = `${me.name} · $${me.rate_per_clip}/clip`;
  }
  loadStats();
  loadMyClips();
}

init();
</script>

</body>
</html>
