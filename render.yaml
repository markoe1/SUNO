services:
  - type: web
    name: suno-production
    plan: starter
    runtime: python
    buildCommand: pip install -r requirements.txt
    preStartCommand: alembic upgrade head
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    repo: https://github.com/markoe1/SUNO.git
    branch: main
    env:
      - key: WHOP_API_KEY
        scope: runtime
      - key: WHOP_COMPANY_ID
        scope: runtime
      - key: WHOP_WEBHOOK_SECRET
        scope: runtime
      - key: DATABASE_URL
        scope: runtime
      - key: REDIS_URL
        scope: runtime
      - key: ANTHROPIC_API_KEY
        scope: runtime
      - key: TIKTOK_CLIENT_ID
        scope: runtime
      - key: TIKTOK_CLIENT_SECRET
        scope: runtime
      - key: TIKTOK_KEY
        scope: runtime
      - key: TIKTOK_SECRET
        scope: runtime
      - key: INSTAGRAM_ACCESS_TOKEN
        scope: runtime
      - key: INSTAGRAM_BUSINESS_ACCOUNT_ID
        scope: runtime
      - key: ADMIN_VERIFY_TOKEN
        value: Uhcq3o7_PDB1WOTlkDXkrz0dtLDozEThkDN2v7uaRAw
        scope: build

  - type: background_worker
    name: suno-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m suno.workers.job_worker
    repo: https://github.com/markoe1/SUNO.git
    branch: main
    env:
      - key: WHOP_API_KEY
        scope: runtime
      - key: WHOP_COMPANY_ID
        scope: runtime
      - key: WHOP_WEBHOOK_SECRET
        scope: runtime
      - key: DATABASE_URL
        scope: runtime
      - key: REDIS_URL
        scope: runtime
      - key: ANTHROPIC_API_KEY
        scope: runtime
      - key: TIKTOK_CLIENT_ID
        scope: runtime
      - key: TIKTOK_CLIENT_SECRET
        scope: runtime
      - key: TIKTOK_KEY
        scope: runtime
      - key: TIKTOK_SECRET
        scope: runtime
      - key: INSTAGRAM_ACCESS_TOKEN
        scope: runtime
      - key: INSTAGRAM_BUSINESS_ACCOUNT_ID
        scope: runtime
